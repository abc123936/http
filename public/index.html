<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>詐雞掰家庭群組</title>

    <style>
      #root, body, html {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
    </style>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="詐雞掰家庭群組" />
    <meta property="og:description" content="守護家人的網路安全，遠離詐騙威脅。" />
    <meta property="og:image" content="https://fraudchickenbye.com/chicken_hero.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://fraudchickenbye.com/chicken_hero.png" />
  </head>

  <body>
    <script>
      (function() {
        try {
          // 清空網頁端所有的本地儲存，確保群組資訊不被保留
          localStorage.clear();
          sessionStorage.clear();
          console.log("群組快取已清空");
        } catch (e) {
          console.error("清空快取失敗", e);
        }
      })();
    </script>

    <div id="root"></div>
  </body>
</html>
